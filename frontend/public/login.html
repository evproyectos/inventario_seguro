<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Inventario Seguro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Inventario Seguro</h1>
    <p class="subtitle">Iniciá sesión para continuar</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Iniciar sesión</button>
    </form>
  </div>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
  
</body>
</html>
