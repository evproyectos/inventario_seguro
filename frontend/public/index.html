<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Redirigiendo...</title>
</head>
<body>
  <script>
    fetch('/api/auth/me', { credentials: 'include' })
      .then(res => {
        if (res.ok) {
          res.json().then(data => {
            sessionStorage.setItem('user', JSON.stringify(data));
            window.location.href = '/dashboard.html';
          });
        } else {
          sessionStorage.clear();
          window.location.href = '/login.html';
        }
      })
      .catch(() => {
        sessionStorage.clear();
        window.location.href = '/login.html';
      });
  </script>
</body>
</html>
