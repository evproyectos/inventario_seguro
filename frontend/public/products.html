<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Inventario Seguro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">Inventario Seguro</span>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="users.html">Usuarios</a>
      <a href="audit.html" id="link-audit" class="hidden">Auditoría</a>
      <button class="btn btn-outline" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>Productos</h2>
      <button class="btn btn-primary" id="btn-nuevo" style="display:none">Nuevo producto</button>
    </div>

    <div id="error-msg" class="alert alert-error hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <div id="form-producto" class="card hidden">
      <h3 id="form-titulo">Nuevo producto</h3>
      <form id="producto-form">
        <input type="hidden" id="producto-id">
        <div class="form-grid">
          <div class="form-group">
            <label for="codigo">Código</label>
            <input type="text" id="codigo" required maxlength="50">
          </div>
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required maxlength="100">
          </div>
          <div class="form-group">
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" required min="0">
          </div>
          <div class="form-group">
            <label for="precio">Precio</label>
            <input type="number" id="precio" required min="0" step="0.01">
          </div>
          <div class="form-group form-full">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" maxlength="500"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <button type="button" class="btn btn-outline" id="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </div>

    <table class="table" id="tabla-productos">
      <thead>
        <tr>
          <th>Código</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th id="col-acciones" style="display:none">Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-productos"></tbody>
    </table>
  </main>

  <script src="js/common.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
